<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>جرد الأجهزة | Asset Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>
  function loadScript(urls, onLoad, onFail) {
    let i = 0;
    function tryNext() {
      if (i >= urls.length) { onFail && onFail(); return; }
      const s = document.createElement('script');
      s.src = urls[i++]; s.onload = onLoad; s.onerror = tryNext;
      document.head.appendChild(s);
    }
    tryNext();
  }
  loadScript([
    'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
    'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
  ], () => {}, () => {});
</script>
<style>
  :root {
    --bg:#0f1419; --panel:#1a2129; --panel-2:#232b35; --border:#2d3742;
    --text:#e6edf3; --text-dim:#8b949e; --accent:#ffb627; --accent-dim:#ffb6271a;
    --green:#3fb950; --green-dim:#3fb9501a; --red:#f85149; --red-dim:#f851491a;
    --blue:#58a6ff; --blue-dim:#58a6ff1a; --yellow:#d29922; --yellow-dim:#d299221a;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body {
    background:var(--bg); color:var(--text);
    font-family:'IBM Plex Sans Arabic',sans-serif;
    font-size:15px; line-height:1.5; min-height:100vh; overscroll-behavior:none;
  }
  body {
    background-image:
      radial-gradient(circle at 0% 0%,rgba(255,182,39,.08) 0%,transparent 40%),
      radial-gradient(circle at 100% 100%,rgba(88,166,255,.05) 0%,transparent 40%);
    background-attachment:fixed;
  }
  .app { max-width:720px; margin:0 auto; padding:16px; padding-bottom:120px; }

  header { display:flex; justify-content:space-between; align-items:center; padding:8px 4px 20px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  header .brand { display:flex; align-items:center; gap:10px; }
  header .logo { width:36px; height:36px; background:var(--accent); border-radius:8px; display:grid; place-items:center; color:var(--bg); font-weight:700; font-family:'JetBrains Mono',monospace; font-size:14px; }
  header h1 { font-size:16px; font-weight:600; }
  header .sub { font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:.05em; text-transform:uppercase; }
  header .count { background:var(--panel); border:1px solid var(--border); padding:8px 14px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:13px; }
  header .count b { color:var(--accent); font-size:18px; }

  .scan-hint { display:flex; align-items:center; gap:12px; background:var(--accent-dim); border:1px solid var(--accent); border-radius:10px; padding:10px 14px; margin-bottom:12px; }
  .hint-num { width:28px; height:28px; border-radius:50%; background:var(--accent); color:var(--bg); display:grid; place-items:center; font-weight:700; font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .hint-num.done { background:var(--green); color:#fff; }
  .hint-text { flex:1; display:flex; flex-direction:column; }
  .hint-text strong { font-size:13px; color:var(--text); }
  .hint-text span { font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; word-break:break-all; }
  .hint-skip { background:transparent; border:1px solid var(--text-dim); color:var(--text-dim); padding:6px 10px; border-radius:6px; font-family:inherit; font-size:11px; cursor:pointer; }

  .scanner-wrap { position:relative; background:var(--panel); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:16px; }
  .scanner-empty { aspect-ratio:4/3; display:grid; place-items:center; text-align:center; padding:30px; }
  .scanner-empty .icon { width:64px; height:64px; margin:0 auto 14px; border:2px dashed var(--accent); border-radius:12px; display:grid; place-items:center; color:var(--accent); }
  .scanner-empty p { color:var(--text-dim); font-size:13px; margin-top:4px; }

  #scanContainer { position:relative; display:none; }
  #scanVideo { width:100%; display:block; max-height:55vh; object-fit:cover; }
  #scanCanvas { display:none; }

  /* الإطار الكبير */
  .scan-frame {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:80%; max-width:340px; height:100px;
    border:2px solid var(--accent); border-radius:8px;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
    pointer-events:none;
  }
  .scan-frame::before,.scan-frame::after {
    content:''; position:absolute; width:20px; height:20px;
    border-color:var(--accent); border-style:solid;
  }
  .scan-frame::before { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
  .scan-frame::after  { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 6px; }

  /* خط المسح */
  .scan-line {
    position:absolute; left:4px; right:4px; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    box-shadow:0 0 8px var(--accent);
    animation:scanline 1.8s ease-in-out infinite;
  }
  @keyframes scanline { 0%,100%{top:4px;opacity:.5} 50%{top:calc(100% - 6px);opacity:1} }

  /* الإطار الصغير للباركود الضيق */
  .scan-frame-sm {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:38%; max-width:150px; height:44px;
    border:1px dashed rgba(255,182,39,0.5);
    border-radius:4px; pointer-events:none;
  }

  .scan-status {
    position:absolute; bottom:48px; left:0; right:0;
    background:rgba(15,20,25,0.8); padding:6px 14px;
    font-size:12px; color:var(--text-dim); text-align:center;
    font-family:'JetBrains Mono',monospace;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .scan-status .dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 1s infinite; flex-shrink:0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* شريط الزوم */
  .zoom-bar {
    display:flex; align-items:center; gap:10px;
    background:rgba(15,20,25,0.95); padding:8px 14px;
    border-top:1px solid var(--border);
  }
  .zoom-btn {
    width:36px; height:36px; border-radius:8px;
    background:var(--panel); border:1px solid var(--border);
    color:var(--text); font-size:22px; cursor:pointer;
    display:grid; place-items:center; flex-shrink:0; line-height:1;
  }
  .zoom-btn:active { background:var(--panel-2); }
  input[type=range].zoom-slider {
    flex:1; accent-color:var(--accent); height:4px; cursor:pointer;
  }
  .zoom-label { font-size:12px; color:var(--accent); font-family:'JetBrains Mono',monospace; min-width:36px; text-align:center; }

  .btn-row { display:flex; gap:10px; margin-bottom:20px; }
  .btn { flex:1; padding:14px 16px; border:1px solid var(--border); background:var(--panel); color:var(--text); border-radius:10px; font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .15s; }
  .btn:active { transform:scale(.98); }
  .btn.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:600; }
  .btn.primary:hover { background:#ffc757; }
  .btn.danger { background:var(--red-dim); color:var(--red); border-color:var(--red); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn svg { flex-shrink:0; }

  .last-scan { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; animation:slideIn .3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .last-scan .label { font-size:11px; color:var(--accent); font-family:'JetBrains Mono',monospace; letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
  .serial-row { display:flex; align-items:baseline; gap:8px; padding:8px 0; font-size:14px; }
  .serial-row+.serial-row { border-top:1px dashed var(--border); }
  .mini-label { color:var(--text-dim); font-size:11px; font-weight:500; min-width:90px; }
  .mini-val { font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--text); word-break:break-all; flex:1; }
  .mini-val.muted { color:var(--text-dim); font-weight:400; font-style:italic; font-family:'IBM Plex Sans Arabic',sans-serif; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:500; }
  .field input { width:100%; padding:12px 14px; background:var(--panel-2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:15px; transition:border-color .15s; }
  .field input:focus { outline:none; border-color:var(--accent); }
  .status-options { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .status-chip { padding:10px; border:1px solid var(--border); border-radius:8px; background:var(--panel-2); color:var(--text-dim); font-size:13px; font-weight:500; cursor:pointer; text-align:center; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .status-chip::before { content:''; width:8px; height:8px; border-radius:50%; background:currentColor; }
  .status-chip[data-val="جديد"]    { color:var(--blue); }
  .status-chip[data-val="مستعمل"] { color:var(--green); }
  .status-chip[data-val="للصيانة"]{ color:var(--yellow); }
  .status-chip[data-val="تالف"]   { color:var(--red); }
  .status-chip.selected[data-val="جديد"]    { background:var(--blue-dim);   border-color:var(--blue); }
  .status-chip.selected[data-val="مستعمل"] { background:var(--green-dim);  border-color:var(--green); }
  .status-chip.selected[data-val="للصيانة"]{ background:var(--yellow-dim); border-color:var(--yellow); }
  .status-chip.selected[data-val="تالف"]   { background:var(--red-dim);    border-color:var(--red); }
  .save-row { display:flex; gap:8px; margin-top:14px; }

  .records { background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .records-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--panel-2); }
  .records-header h2 { font-size:14px; font-weight:600; }
  .records-header .meta { font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
  .records-empty { padding:40px 20px; text-align:center; color:var(--text-dim); font-size:13px; }
  .record { padding:14px 16px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:1fr auto; gap:4px 12px; align-items:center; }
  .record:last-child { border-bottom:none; }
  .record .serial { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:var(--text); word-break:break-all; }
  .record .model { font-size:12px; color:var(--text-dim); grid-column:1; }
  .record .status-pill { grid-row:1/3; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; white-space:nowrap; border:1px solid; }
  .record .status-pill[data-val="جديد"]    { color:var(--blue);   border-color:var(--blue);   background:var(--blue-dim); }
  .record .status-pill[data-val="مستعمل"] { color:var(--green);  border-color:var(--green);  background:var(--green-dim); }
  .record .status-pill[data-val="للصيانة"]{ color:var(--yellow); border-color:var(--yellow); background:var(--yellow-dim); }
  .record .status-pill[data-val="تالف"]   { color:var(--red);    border-color:var(--red);    background:var(--red-dim); }
  .record .del-btn { grid-column:1/-1; margin-top:8px; background:none; border:none; color:var(--red); font-family:inherit; font-size:12px; cursor:pointer; padding:4px 0; text-align:start; display:none; }
  .record.expanded .del-btn { display:inline-flex; align-items:center; gap:4px; }

  .sticky-bar { position:fixed; bottom:16px; left:16px; right:16px; max-width:688px; margin:0 auto; z-index:10; }
  .sticky-bar .btn { box-shadow:0 8px 24px rgba(0,0,0,.4); }

  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--green); color:#000; padding:10px 18px; border-radius:8px; font-weight:600; font-size:13px; z-index:100; transition:transform .3s; box-shadow:0 4px 12px rgba(0,0,0,.3); }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.error { background:var(--red); color:#fff; }

  @media(max-width:380px){ .app{padding:12px} header .sub{display:none} }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="logo">SC</div>
      <div>
        <h1>جرد الأجهزة</h1>
        <div class="sub">Asset Scanner</div>
      </div>
    </div>
    <div class="count"><b id="totalCount">0</b> جهاز</div>
  </header>

  <div id="scanHint" class="scan-hint" style="display:none;"></div>

  <div class="scanner-wrap">
    <div id="scannerEmpty" class="scanner-empty">
      <div class="icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <strong>اضغط "تشغيل الكاميرا"</strong>
      <p>سكان الرقم التسلسلي ثم رقم الأصل</p>
    </div>

    <div id="scanContainer">
      <video id="scanVideo" autoplay muted playsinline></video>
      <canvas id="scanCanvas"></canvas>
      <div class="scan-frame"><div class="scan-line"></div></div>
      <div class="scan-frame-sm"></div>
      <div class="scan-status">
        <div class="dot"></div>
        <span id="scanStatusText">جاهز للسكان...</span>
      </div>
      <div class="zoom-bar">
        <button class="zoom-btn" id="zoomOut">−</button>
        <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="5" step="0.1" value="1">
        <button class="zoom-btn" id="zoomIn">+</button>
        <span class="zoom-label" id="zoomLabel">1×</span>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button id="startBtn" class="btn primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      تشغيل الكاميرا
    </button>
    <button id="stopBtn" class="btn" style="display:none; flex:0 0 auto;">إيقاف</button>
  </div>

  <div id="lastScanCard" style="display:none;"></div>

  <div class="records">
    <div class="records-header">
      <h2>السجل</h2>
      <span class="meta" id="recordsMeta">—</span>
    </div>
    <div id="recordsList">
      <div class="records-empty">لا توجد أجهزة مسجلة بعد</div>
    </div>
  </div>
</div>

<div class="sticky-bar">
  <div class="btn-row" style="margin:0;">
    <button id="exportBtn" class="btn primary" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      تصدير Excel
    </button>
    <button id="clearBtn" class="btn danger" style="flex:0 0 auto;" disabled>مسح الكل</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY = 'asset_scanner_records_v2';
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let isScanning    = false;
let scanStep      = 'serial';
let pendingSerial = null;
let pendingAsset  = null;
let lastScanTime  = 0;
let animFrameId   = null;
let videoStream   = null;
let barcodeDetector = null;
let currentZoom   = 1;
let maxZoom       = 5;
let zoomSupported = false;
let fallbackScanner = null;

const $ = id => document.getElementById(id);

const startBtn       = $('startBtn');
const stopBtn        = $('stopBtn');
const scannerEmpty   = $('scannerEmpty');
const scanContainer  = $('scanContainer');
const lastScanCard   = $('lastScanCard');
const recordsList    = $('recordsList');
const recordsMeta    = $('recordsMeta');
const totalCount     = $('totalCount');
const exportBtn      = $('exportBtn');
const clearBtn       = $('clearBtn');
const toast          = $('toast');

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  toast.textContent = msg;
  toast.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ── Storage ───────────────────────────────────────────────────────────────────
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

// ── Counts ────────────────────────────────────────────────────────────────────
function updateCounts() {
  totalCount.textContent = records.length;
  exportBtn.disabled = clearBtn.disabled = records.length === 0;
  if (!records.length) { recordsMeta.textContent = '—'; return; }
  const s = records.reduce((a,r) => { a[r.status]=(a[r.status]||0)+1; return a; }, {});
  recordsMeta.textContent = Object.entries(s).map(([k,v]) => `${k}: ${v}`).join(' • ');
}

// ── HTML escape ───────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Records UI ────────────────────────────────────────────────────────────────
function renderRecords() {
  if (!records.length) {
    recordsList.innerHTML = '<div class="records-empty">لا توجد أجهزة مسجلة بعد</div>';
    return;
  }
  recordsList.innerHTML = records.slice().reverse().map((r,i) => {
    const idx = records.length - 1 - i;
    const assetLine = r.asset
      ? `<div class="model" style="font-family:'JetBrains Mono',monospace;color:var(--accent);">${escapeHtml(r.asset)}</div>`
      : '';
    return `
      <div class="record" data-idx="${idx}">
        <div class="serial">${escapeHtml(r.serial)}</div>
        ${assetLine}
        <div class="model">${escapeHtml(r.model||'—')}</div>
        <span class="status-pill" data-val="${r.status}">${r.status}</span>
        <button class="del-btn" data-del="${idx}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          حذف هذا السجل
        </button>
      </div>`;
  }).join('');

  recordsList.querySelectorAll('.record').forEach(el =>
    el.addEventListener('click', e => {
      if (!e.target.closest('.del-btn')) el.classList.toggle('expanded');
    }));
  recordsList.querySelectorAll('.del-btn').forEach(btn =>
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = +btn.dataset.del;
      if (confirm(`حذف الجهاز ${records[idx].serial}؟`)) {
        records.splice(idx,1); save(); renderRecords(); updateCounts();
      }
    }));
}

// ── Scan Hint ─────────────────────────────────────────────────────────────────
function updateScanHint() {
  const el = $('scanHint');
  if (!isScanning) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  if (scanStep === 'serial') {
    el.innerHTML = `
      <div class="hint-num">1</div>
      <div class="hint-text">
        <strong>سكان الرقم التسلسلي</strong>
        <span>وجّه الكاميرا على الباركود / QR</span>
      </div>`;
  } else if (scanStep === 'asset') {
    el.innerHTML = `
      <div class="hint-num done">✓</div>
      <div class="hint-text">
        <strong>سكان رقم الأصل (ZATCA)</strong>
        <span>السيريال: ${escapeHtml(pendingSerial)}</span>
      </div>
      <button class="hint-skip" id="skipAssetBtn">تخطي</button>`;
    $('skipAssetBtn').addEventListener('click', e => {
      e.stopPropagation(); pendingAsset = ''; proceedToForm();
    });
  } else {
    el.style.display = 'none';
  }
}

// ── Form ──────────────────────────────────────────────────────────────────────
function proceedToForm() {
  scanStep = 'paused';
  updateScanHint();
  showScanForm(pendingSerial, pendingAsset);
}

function showScanForm(serial, asset) {
  const exists  = records.find(r => r.serial === serial);
  const warning = exists
    ? `<div style="background:var(--yellow-dim);color:var(--yellow);border:1px solid var(--yellow);padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;">⚠ هذا السيريال مسجّل سابقاً (سيتم التحديث)</div>`
    : '';
  const assetDisplay = asset
    ? `<div class="serial-row"><span class="mini-label">رقم الأصل:</span><span class="mini-val">${escapeHtml(asset)}</span></div>`
    : `<div class="serial-row"><span class="mini-label">رقم الأصل:</span><span class="mini-val muted">— لم يُسكن —</span></div>`;

  lastScanCard.className = 'last-scan';
  lastScanCard.style.display = 'block';
  lastScanCard.innerHTML = `
    ${warning}
    <div class="label">السكان الجديد</div>
    <div class="serial-row"><span class="mini-label">السيريال:</span><span class="mini-val">${escapeHtml(serial)}</span></div>
    ${assetDisplay}
    <div class="field" style="margin-top:14px;">
      <label>رقم الأصل (يدوي إذا لزم)</label>
      <input type="text" id="assetEditInput" placeholder="ZATCA-XXXXX" autocomplete="off" value="${escapeHtml(asset||'')}">
    </div>
    <div class="field">
      <label>الموديل</label>
      <input type="text" id="modelInput" placeholder="مثال: HP EliteBook 840 G8" autocomplete="off">
    </div>
    <div class="field">
      <label>الحالة</label>
      <div class="status-options">
        <div class="status-chip" data-val="جديد">جديد</div>
        <div class="status-chip" data-val="مستعمل">مستعمل</div>
        <div class="status-chip" data-val="للصيانة">للصيانة</div>
        <div class="status-chip" data-val="تالف">تالف</div>
      </div>
    </div>
    <div class="field">
      <label>ملاحظات (اختياري)</label>
      <input type="text" id="notesInput" placeholder="مكان الجهاز، اسم المستخدم، إلخ" autocomplete="off">
    </div>
    <div class="save-row">
      <button class="btn primary" id="saveBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        حفظ والتالي
      </button>
      <button class="btn" id="cancelBtn" style="flex:0 0 auto;">إلغاء</button>
    </div>`;

  let selectedStatus = null;
  lastScanCard.querySelectorAll('.status-chip').forEach(chip =>
    chip.addEventListener('click', () => {
      lastScanCard.querySelectorAll('.status-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedStatus = chip.dataset.val;
    }));

  $('saveBtn').addEventListener('click', () => {
    if (!selectedStatus) { showToast('اختر الحالة أولاً', 'error'); return; }
    const record = {
      serial,
      asset:  $('assetEditInput').value.trim(),
      model:  $('modelInput').value.trim(),
      status: selectedStatus,
      notes:  $('notesInput').value.trim(),
      scannedAt: new Date().toISOString()
    };
    const existsIdx = records.findIndex(r => r.serial === serial);
    if (existsIdx >= 0) { records[existsIdx] = record; showToast('تم تحديث السجل'); }
    else { records.push(record); showToast('تم الحفظ ✓ — سكان جهاز جديد'); }
    save(); renderRecords(); updateCounts();
    lastScanCard.style.display = 'none';
    pendingSerial = pendingAsset = null;
    scanStep = 'serial';
    updateScanHint();
    if (navigator.vibrate) navigator.vibrate(50);
  });

  $('cancelBtn').addEventListener('click', () => {
    lastScanCard.style.display = 'none';
    pendingSerial = pendingAsset = null;
    scanStep = 'serial';
    updateScanHint();
  });

  lastScanCard.scrollIntoView({ behavior:'smooth', block:'center' });
}

// ── Beep ──────────────────────────────────────────────────────────────────────
function playBeep() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 1200;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(); osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// ── On Scan Result ────────────────────────────────────────────────────────────
function onScanResult(text) {
  if (scanStep === 'paused') return;
  const now = Date.now();
  if (now - lastScanTime < 800) return;
  lastScanTime = now;

  if (navigator.vibrate) navigator.vibrate([60,30,60]);
  playBeep();

  const statusEl = $('scanStatusText');

  if (scanStep === 'serial') {
    pendingSerial = text;
    scanStep = 'asset';
    updateScanHint();
    if (statusEl) statusEl.textContent = 'السيريال تم ✓ — سكن رقم الأصل';
    showToast('✓ السيريال تم — سكن رقم الأصل');
  } else if (scanStep === 'asset') {
    if (text === pendingSerial) {
      showToast('هذا نفس السيريال — سكن رقم أصل مختلف', 'error');
      return;
    }
    pendingAsset = text;
    proceedToForm();
  }
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
async function applyZoom(val) {
  currentZoom = Math.min(Math.max(val, 1), maxZoom);
  const slider = $('zoomSlider');
  const label  = $('zoomLabel');
  if (slider) slider.value = currentZoom;
  if (label)  label.textContent = currentZoom.toFixed(1) + '×';

  if (zoomSupported && videoStream) {
    const track = videoStream.getVideoTracks()[0];
    try {
      await track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
      return;
    } catch(e) {}
  }
  // CSS fallback
  const vid = document.getElementById('scanVideo');
  if (vid) vid.style.transform = `scale(${currentZoom})`;
}

// ── Native BarcodeDetector ────────────────────────────────────────────────────
async function initBarcodeDetector() {
  if (!('BarcodeDetector' in window)) return null;
  try {
    const formats = await BarcodeDetector.getSupportedFormats();
    return new BarcodeDetector({ formats });
  } catch(e) { return null; }
}

// ── Detection Loop (إطارين بالتوازي) ─────────────────────────────────────────
async function detectLoop() {
  if (!isScanning || scanStep === 'paused') {
    animFrameId = requestAnimationFrame(detectLoop);
    return;
  }
  const vid = document.getElementById('scanVideo');
  if (!vid || vid.readyState < 2) {
    animFrameId = requestAnimationFrame(detectLoop);
    return;
  }

  if (barcodeDetector) {
    try {
      const vw = vid.videoWidth;
      const vh = vid.videoHeight;
      const cvs = document.getElementById('scanCanvas');
      const ctx = cvs.getContext('2d');

      // الإطار الكبير — 80% عرض، 35% ارتفاع
      const bigX = Math.floor(vw * 0.10), bigY = Math.floor(vh * 0.325);
      const bigW = Math.floor(vw * 0.80), bigH = Math.floor(vh * 0.35);
      cvs.width = bigW; cvs.height = bigH;
      ctx.drawImage(vid, bigX, bigY, bigW, bigH, 0, 0, bigW, bigH);
      const bigRes = await barcodeDetector.detect(cvs);
      if (bigRes.length) { onScanResult(bigRes[0].rawValue); animFrameId = requestAnimationFrame(detectLoop); return; }

      // الإطار الصغير — 40% عرض، 15% ارتفاع
      const smX = Math.floor(vw * 0.30), smY = Math.floor(vh * 0.425);
      const smW = Math.floor(vw * 0.40), smH = Math.floor(vh * 0.15);
      cvs.width = smW; cvs.height = smH;
      ctx.drawImage(vid, smX, smY, smW, smH, 0, 0, smW, smH);
      const smRes = await barcodeDetector.detect(cvs);
      if (smRes.length) { onScanResult(smRes[0].rawValue); }
    } catch(e) {}
  }

  animFrameId = requestAnimationFrame(detectLoop);
}

// ── Start Scanner ─────────────────────────────────────────────────────────────
async function startScanner() {
  if (isScanning) return;
  startBtn.disabled = true;
  startBtn.textContent = 'جاري التشغيل...';

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal:'environment' }, width: { ideal:1920 }, height: { ideal:1080 } }
    });

    const vid = document.getElementById('scanVideo');
    vid.srcObject = videoStream;
    await vid.play();

    // إعداد الزوم
    const track = videoStream.getVideoTracks()[0];
    const caps  = track.getCapabilities ? track.getCapabilities() : {};
    zoomSupported = !!(caps.zoom);
    if (caps.zoom) {
      maxZoom = caps.zoom.max || 5;
      const slider = $('zoomSlider');
      if (slider) slider.max = maxZoom;
    }

    // ربط أزرار الزوم
    const slider = $('zoomSlider');
    if (slider) {
      slider.addEventListener('input', () => applyZoom(+slider.value));
      $('zoomIn').addEventListener('click',  () => applyZoom(currentZoom + 0.5));
      $('zoomOut').addEventListener('click', () => applyZoom(currentZoom - 0.5));
    }

    barcodeDetector = await initBarcodeDetector();

    if (!barcodeDetector) {
      showToast('جهازك لا يدعم Native Scanner — جارٍ تحميل بديل...', 'error');
      await loadFallbackLib();
      return;
    }

    scannerEmpty.style.display = 'none';
    scanContainer.style.display = 'block';
    startBtn.style.display = 'none';
    stopBtn.style.display  = 'flex';
    isScanning = true;
    if (!pendingSerial) scanStep = 'serial';
    updateScanHint();

    animFrameId = requestAnimationFrame(detectLoop);

  } catch(err) {
    console.error(err);
    showToast('تعذّر فتح الكاميرا — تأكد من الإذن', 'error');
  } finally {
    startBtn.disabled = false;
    startBtn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg> تشغيل الكاميرا`;
  }
}

// ── Fallback (iOS / متصفحات قديمة) ───────────────────────────────────────────
function loadFallbackLib() {
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js';
    s.onload = () => { startFallbackScanner(); resolve(); };
    s.onerror = () => { showToast('فشل تحميل المكتبة الاحتياطية', 'error'); resolve(); };
    document.head.appendChild(s);
  });
}

async function startFallbackScanner() {
  scanContainer.innerHTML = `
    <div id="fb_reader"></div>
    <div class="zoom-bar">
      <button class="zoom-btn" id="zoomOut">−</button>
      <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="5" step="0.1" value="1">
      <button class="zoom-btn" id="zoomIn">+</button>
      <span class="zoom-label" id="zoomLabel">1×</span>
    </div>`;
  scanContainer.style.display = 'block';
  scannerEmpty.style.display = 'none';
  startBtn.style.display = 'none';
  stopBtn.style.display  = 'flex';
  isScanning = true;
  if (!pendingSerial) scanStep = 'serial';
  updateScanHint();

  const slider = $('zoomSlider');
  if (slider) {
    slider.addEventListener('input', () => applyZoom(+slider.value));
    $('zoomIn').addEventListener('click',  () => applyZoom(currentZoom + 0.5));
    $('zoomOut').addEventListener('click', () => applyZoom(currentZoom - 0.5));
  }

  try {
    fallbackScanner = new Html5Qrcode('fb_reader');
    await fallbackScanner.start(
      { facingMode:'environment' },
      {
        fps: 15,
        qrbox: (w,h) => ({ width:Math.min(Math.floor(w*.8),350), height:Math.min(Math.floor(h*.3),110) }),
        experimentalFeatures: { useBarCodeDetectorIfSupported:true },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.DATA_MATRIX,
          Html5QrcodeSupportedFormats.PDF_417,
        ],
        showTorchButtonIfSupported: true,
      },
      text => onScanResult(text),
      () => {}
    );
  } catch(e) {
    showToast('تعذّر تشغيل السكانر', 'error');
    stopScanner();
  }
}

// ── Stop Scanner ──────────────────────────────────────────────────────────────
async function stopScanner() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  if (fallbackScanner) {
    try { await fallbackScanner.stop(); await fallbackScanner.clear(); } catch(e) {}
    fallbackScanner = null;
  }

  currentZoom = 1;
  isScanning  = false;

  scannerEmpty.style.display = 'grid';
  scanContainer.style.display = 'none';
  // إعادة بناء scanContainer لأن الـ fallback يعدّله
  scanContainer.innerHTML = `
    <video id="scanVideo" autoplay muted playsinline></video>
    <canvas id="scanCanvas"></canvas>
    <div class="scan-frame"><div class="scan-line"></div></div>
    <div class="scan-frame-sm"></div>
    <div class="scan-status"><div class="dot"></div><span id="scanStatusText">جاهز للسكان...</span></div>
    <div class="zoom-bar">
      <button class="zoom-btn" id="zoomOut">−</button>
      <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="5" step="0.1" value="1">
      <button class="zoom-btn" id="zoomIn">+</button>
      <span class="zoom-label" id="zoomLabel">1×</span>
    </div>`;

  startBtn.style.display = 'flex';
  stopBtn.style.display  = 'none';
  updateScanHint();
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportToExcel() {
  if (!records.length) return;
  const data = records.map((r,i) => ({
    '#': i+1,
    'الرقم التسلسلي': r.serial,
    'رقم الأصل': r.asset||'',
    'الموديل': r.model||'',
    'الحالة': r.status,
    'ملاحظات': r.notes||'',
    'تاريخ السكان': new Date(r.scannedAt).toLocaleString('ar-SA')
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:5},{wch:25},{wch:22},{wch:25},{wch:12},{wch:30},{wch:22}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'جرد الأجهزة');
  if (!wb.Workbook) wb.Workbook = {};
  if (!wb.Workbook.Views) wb.Workbook.Views = [{}];
  wb.Workbook.Views[0].RTL = true;
  XLSX.writeFile(wb, `Asset_Inventory_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast(`تم تصدير ${records.length} جهاز`);
}

function clearAll() {
  if (!records.length) return;
  if (!confirm(`سيتم حذف جميع السجلات (${records.length}). هل أنت متأكد؟`)) return;
  records = []; save(); renderRecords(); updateCounts();
  showToast('تم مسح الكل');
}

// ── Init ──────────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', startScanner);
stopBtn.addEventListener('click',  stopScanner);
exportBtn.addEventListener('click', exportToExcel);
clearBtn.addEventListener('click',  clearAll);

renderRecords();
updateCounts();
</script>
